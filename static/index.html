<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AcademicRescue AI</title>
<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@400;700;900&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:Heebo,sans-serif;background:#0a0a0f;color:#f0f0f5;min-height:100vh;}
nav{background:#111118;border-bottom:1px solid rgba(255,255,255,0.07);padding:0 1.5rem;height:56px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;}
.logo{font-size:18px;font-weight:900;}.logo span{color:#00d97e;}
.app{max-width:800px;margin:0 auto;padding:1.5rem 1rem;}
.card{background:#111118;border:1px solid rgba(255,255,255,0.07);border-radius:14px;padding:1.5rem;margin-bottom:1rem;}
.label{font-size:11px;font-weight:700;color:#55556a;text-transform:uppercase;letter-spacing:1px;margin-bottom:12px;}
.modes{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:1rem;}
@media(min-width:600px){.modes{grid-template-columns:repeat(4,1fr);}}
.mode{background:#1a1a24;border:2px solid rgba(255,255,255,0.07);border-radius:10px;padding:14px;text-align:center;cursor:pointer;}
.mode:hover{border-color:#00d97e;background:rgba(0,217,126,0.1);}
.mode.active{border-color:#00d97e;background:rgba(0,217,126,0.1);}
.mode-icon{font-size:24px;margin-bottom:6px;}
.mode-title{font-size:12px;font-weight:700;}
.mode-desc{font-size:10px;color:#55556a;margin-top:2px;}
.upload{border:2px dashed rgba(255,255,255,0.13);border-radius:12px;padding:3rem;text-align:center;cursor:pointer;display:none;}
.upload.show{display:block;}
.upload:hover{border-color:#00d97e;background:rgba(0,217,126,0.05);}
.btn{width:100%;padding:14px;background:#00d97e;color:#001a0e;border:none;border-radius:10px;font-family:Heebo,sans-serif;font-size:16px;font-weight:700;cursor:pointer;display:none;margin-bottom:8px;}
.btn.show{display:block;}
.btn.rec{background:#ff4757;color:white;}
.btn.loading{background:#1a1a24;color:#55556a;cursor:not-allowed;}
.status{text-align:center;font-size:12px;color:#55556a;min-height:18px;}
.status.ok{color:#00d97e;}.status.err{color:#ff4757;}.status.proc{color:#7c6af7;}
.empty{padding:4rem;text-align:center;color:#55556a;}
.empty-icon{font-size:56px;opacity:0.2;margin-bottom:1rem;}
.result{font-size:14px;color:#9090aa;line-height:1.9;}
.chip{display:inline-block;background:rgba(124,106,247,0.1);border:1px solid rgba(124,106,247,0.2);color:#7c6af7;font-size:11px;padding:3px 10px;border-radius:20px;margin:2px;}
.sec-title{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:0.8px;margin-bottom:10px;}
.formula-box{background:rgba(124,106,247,0.07);border:1px solid rgba(124,106,247,0.18);border-radius:8px;padding:12px;margin-bottom:8px;}
.formula-latex{text-align:center;padding:8px 0;direction:ltr;font-size:15px;}
.ex-step{display:flex;gap:10px;margin-bottom:8px;align-items:flex-start;}
.ex-num{width:24px;height:24px;min-width:24px;background:rgba(0,217,126,0.1);border-radius:50%;font-size:11px;font-weight:700;color:#00d97e;display:flex;align-items:center;justify-content:center;}
.act-row{display:flex;gap:8px;flex-wrap:wrap;margin-top:1rem;}
.act-btn{padding:10px 14px;border-radius:8px;border:1.5px solid;background:transparent;font-family:Heebo,sans-serif;font-size:12px;font-weight:600;cursor:pointer;}
.act-g{border-color:#00d97e;color:#00d97e;}.act-p{border-color:#7c6af7;color:#7c6af7;}
</style>
</head>
<body>
<nav>
  <div class="logo">Academic<span>Rescue</span></div>
  <div style="font-size:11px;color:#55556a;">סיכום שיעורים חכם</div>
</nav>
<div class="app">
  <div class="card">
    <div class="label">מה אתה רוצה לסכם?</div>
    <div class="modes">
      <div class="mode" id="m-file"><div class="mode-icon">📁</div><div class="mode-title">העלאת קובץ</div><div class="mode-desc">MP4, MP3, WAV</div></div>
      <div class="mode" id="m-rec"><div class="mode-icon">🎬</div><div class="mode-title">הקלטה שמורה</div><div class="mode-desc">מסך + סאונד</div></div>
      <div class="mode" id="m-live"><div class="mode-icon">📡</div><div class="mode-title">שיעור חי</div><div class="mode-desc">זום פתוח</div></div>
      <div class="mode" id="m-class"><div class="mode-icon">🏫</div><div class="mode-title">כיתה פיזית</div><div class="mode-desc">מיקרופון</div></div>
    </div>
    <div class="upload" id="uploadZone">
      <div style="font-size:36px;margin-bottom:10px;">📎</div>
      <div style="font-size:14px;color:#9090aa;">גרור קובץ לכאן או לחץ לבחירה</div>
      <div style="font-size:11px;color:#55556a;margin-top:4px;">MP4 · MP3 · WAV · M4A</div>
    </div>
    <input type="file" id="fileIn" accept="audio/*,video/*" style="display:none">
    <button class="btn" id="recBtn">🎬 התחל שיעור</button>
    <div class="status" id="status">בחר מצב כדי להתחיל</div>
  </div>
  <div id="out">
    <div class="empty">
      <div class="empty-icon">🎓</div>
      <div style="font-size:18px;font-weight:700;color:#9090aa;margin-bottom:6px;">מוכן לסכם</div>
      <div style="font-size:13px;">בחר מצב למעלה והתחל</div>
    </div>
  </div>
</div>
<script>
var BASE = window.location.origin;
var mode = null, rec = false, mr = null, chunks = [], shots = [], secs = 0;
var timerInt = null, shotInt = null, sumData = null, txText = '';

document.getElementById('m-file').onclick = function(){ setMode('file'); };
document.getElementById('m-rec').onclick = function(){ setMode('rec'); };
document.getElementById('m-live').onclick = function(){ setMode('live'); };
document.getElementById('m-class').onclick = function(){ setMode('class'); };
document.getElementById('recBtn').onclick = function(){ toggleRec(); };
document.getElementById('uploadZone').onclick = function(){ document.getElementById('fileIn').click(); };
document.getElementById('fileIn').onchange = function(){ if(this.files[0]) doFile(this.files[0]); this.value=''; };

function setMode(m) {
  mode = m;
  document.querySelectorAll('.mode').forEach(function(el){ el.classList.remove('active'); });
  document.getElementById('m-'+m).classList.add('active');
  var uz = document.getElementById('uploadZone');
  var rb = document.getElementById('recBtn');
  uz.className = 'upload';
  rb.className = 'btn';
  if (m === 'file') {
    uz.className = 'upload show';
    st('גרור קובץ או לחץ לבחירה', 'ok');
  } else {
    rb.className = 'btn show';
    st('לחץ התחל שיעור', 'ok');
  }
}

function toggleRec() {
  if (rec) stopRec(); else startRec();
}

async function startRec() {
  try {
    var s;
    if (mode === 'class') {
      s = await navigator.mediaDevices.getUserMedia({audio:true,video:false});
    } else {
      s = await navigator.mediaDevices.getDisplayMedia({video:{frameRate:1},audio:true});
      var at = s.getAudioTracks();
      if (!at.length) { s.getTracks().forEach(function(t){t.stop();}); st('לא נמצא סאונד — סמן Share audio','err'); return; }
    }
    var mime = ['audio/webm;codecs=opus','audio/webm','audio/mp4','audio/ogg'].find(function(t){return MediaRecorder.isTypeSupported(t);})||'';
    mr = new MediaRecorder(new MediaStream(mode==='class'?s.getAudioTracks():s.getAudioTracks()), mime?{mimeType:mime}:{});
    chunks = []; secs = 0;
    mr.ondataavailable = function(e){ if(e.data.size>0) chunks.push(e.data); };
    mr.start(1000);
    rec = true;
    document.getElementById('recBtn').className = 'btn show rec';
    document.getElementById('recBtn').textContent = '⏹ עצור שיעור';
    st('מקליט...', 'ok');
    timerInt = setInterval(function(){ secs++; }, 1000);
  } catch(e) {
    st('שגיאה: '+e.message, 'err');
  }
}

async function stopRec() {
  clearInterval(timerInt); rec = false;
  document.getElementById('recBtn').className = 'btn show loading';
  document.getElementById('recBtn').textContent = '⏳ מעבד...';
  if (mr && mr.state !== 'inactive') { mr.stop(); await new Promise(function(r){mr.onstop=r;}); }
  var blob = new Blob(chunks, {type:'audio/webm'});
  if (blob.size < 8000) { st('ההקלטה קצרה מדי','err'); resetBtn(); return; }
  await processAudio(blob, []);
}

async function doFile(file) {
  st('מתמלל: '+file.name, 'proc');
  showLoad('📝 מתמלל...');
  try {
    var fd = new FormData();
    fd.append('file', file, file.name);
    var r = await fetch(BASE+'/transcribe', {method:'POST', body:fd});
    if (!r.ok) throw new Error(await r.text());
    var d = await r.json();
    txText = d.text || '';
    showLoad('🧠 מסכם...');
    var sr = await fetch(BASE+'/summarize', {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({transcript:txText, screen_text:'', segments:d.segments||[], shots_meta:[]})});
    if (!sr.ok) throw new Error(await sr.text());
    sumData = await sr.json();
    secs = Math.round(file.size/16000);
    showSummary(sumData, txText, 0);
    st('הסיכום מוכן! 🎉', 'ok');
  } catch(e) {
    st('שגיאה: '+e.message, 'err');
    document.getElementById('out').innerHTML = '<div class="card"><div style="color:#ff4757">שגיאה: '+e.message+'</div></div>';
  }
}

async function processAudio(blob, screenshots) {
  showLoad('📝 מתמלל...');
  try {
    var fd = new FormData();
    fd.append('file', blob, 'rec.webm');
    var r = await fetch(BASE+'/transcribe', {method:'POST', body:fd});
    if (!r.ok) throw new Error(await r.text());
    var d = await r.json();
    txText = d.text || '';
    showLoad('🧠 מסכם...');
    var sr = await fetch(BASE+'/summarize', {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({transcript:txText, screen_text:'', segments:d.segments||[], shots_meta:[]})});
    if (!sr.ok) throw new Error(await sr.text());
    sumData = await sr.json();
    showSummary(sumData, txText, 0);
    st('הסיכום מוכן! 🎉', 'ok');
    resetBtn();
  } catch(e) {
    st('שגיאה: '+e.message, 'err');
    resetBtn();
  }
}

function showSummary(data, transcript, shotCount) {
  var html = '<div class="card"><div style="font-size:20px;font-weight:900;margin-bottom:6px;">'+(data.title||'סיכום השיעור')+'</div>';
  html += '<div style="font-size:11px;color:#55556a;margin-bottom:10px;">⏱ '+Math.floor(secs/60)+' דקות</div>';
  html += '<div>'+(data.topics||[]).map(function(t){return'<span class="chip">'+t+'</span>';}).join('')+'</div></div>';

  (data.sections||[]).forEach(function(sec) {
    if (sec.type==='explanation') {
      html += '<div class="card"><div class="sec-title" style="color:#00d97e">📖 '+sec.title+'</div><div class="result">'+(sec.content||'').replace(/\n/g,'<br>')+'</div></div>';
    } else if (sec.type==='formula') {
      var fh = (sec.formulas||[]).map(function(f){
        return '<div class="formula-box"><div style="font-size:11px;font-weight:700;color:#7c6af7;margin-bottom:6px;">'+f.name+'</div><div class="formula-latex">'+f.latex+'</div><div style="font-size:12px;color:#55556a;margin-top:6px;">💡 '+f.meaning+'</div></div>';
      }).join('');
      html += '<div class="card"><div class="sec-title" style="color:#7c6af7">📐 '+sec.title+'</div>'+fh+'</div>';
    } else if (sec.type==='exercise') {
      var sh = (sec.steps||[]).map(function(s,i){return '<div class="ex-step"><div class="ex-num">'+(i+1)+'</div><div><div style="font-size:13px;color:#9090aa;">'+s.desc+'</div>'+(s.formula?'<div style="font-size:13px;color:#f0f0f5;background:#1a1a24;border-radius:5px;padding:5px 10px;margin-top:4px;direction:ltr;text-align:center;">'+s.formula+'</div>':'')+'</div></div>';}).join('');
      html += '<div class="card"><div class="sec-title" style="color:#ffa726">✏️ '+sec.title+'</div><div style="background:#1a1a24;border-radius:8px;padding:12px;margin-bottom:12px;font-size:13px;color:#9090aa;">❓ '+(sec.problem||'')+'</div>'+sh+(sec.answer?'<div style="background:rgba(0,217,126,0.1);border:1px solid rgba(0,217,126,0.25);border-radius:8px;padding:12px;font-size:13px;font-weight:600;color:#00d97e;margin-top:10px;">✅ '+sec.answer+'</div>':'')+'</div>';
    } else if (sec.type==='highlight') {
      html += '<div class="card" style="background:rgba(255,167,38,0.05);border-color:rgba(255,167,38,0.15);"><div class="sec-title" style="color:#ffa726">🎯 '+sec.title+'</div>'+((sec.points||[]).map(function(p){return'<div style="font-size:13px;color:#9090aa;padding:6px 0;border-bottom:1px solid rgba(255,255,255,0.04);">⭐ '+p+'</div>';}).join(''))+'</div>';
    }
  });

  if (transcript) {
    html += '<div class="card"><div class="sec-title" style="color:#55556a;">תמלול מלא</div><div style="font-size:13px;color:#9090aa;line-height:1.8;max-height:140px;overflow-y:auto;">'+transcript+'</div></div>';
  }

  html += '<div class="card"><div class="act-row"><button class="act-btn act-g" id="btnPDF">📄 סיכום PDF</button><button class="act-btn act-p" id="btnEx">📝 דף תרגילים</button></div></div>';

  document.getElementById('out').innerHTML = html;
  document.getElementById('btnPDF').onclick = function(){ exportPDF('summary'); };
  document.getElementById('btnEx').onclick = function(){ exportPDF('exercises'); };

  if (window.MathJax && MathJax.typesetPromise) MathJax.typesetPromise([document.getElementById('out')]);
}

function exportPDF(m) {
  if (!sumData) return;
  var w = window.open('', '_blank');
  var title = sumData.title || 'סיכום';
  var body = '';
  if (m === 'summary') {
    (sumData.sections||[]).forEach(function(sec){
      if (sec.type==='explanation') body += '<h2>📖 '+sec.title+'</h2><p>'+(sec.content||'').replace(/\n/g,'<br>')+'</p>';
      else if (sec.type==='formula') body += '<h2>📐 '+sec.title+'</h2>'+((sec.formulas||[]).map(function(f){return '<div style="background:#f8f7ff;border:1px solid #e0ddff;border-radius:8px;padding:12px;margin:8px 0"><b style="color:#7c6af7">'+f.name+'</b><div style="text-align:center;font-size:15px;padding:8px;direction:ltr">'+f.latex+'</div><div style="color:#666;font-size:12px">💡 '+f.meaning+'</div></div>';}).join(''));
      else if (sec.type==='exercise') body += '<h2>✏️ '+sec.title+'</h2><div style="background:#fffbf0;border:1px solid #ffe0a0;border-radius:8px;padding:12px"><p>❓ '+(sec.problem||'')+'</p>'+((sec.steps||[]).map(function(s,i){return '<p>'+(i+1)+'. '+s.desc+(s.formula?' — <code>'+s.formula+'</code>':'')+'</p>';}).join(''))+(sec.answer?'<p style="color:#007a47;font-weight:bold">✅ '+sec.answer+'</p>':'')+'</div>';
      else if (sec.type==='highlight') body += '<h2>🎯 '+sec.title+'</h2>'+((sec.points||[]).map(function(p){return '<p>⭐ '+p+'</p>';}).join(''));
    });
  } else {
    (sumData.exercises||[]).forEach(function(ex,i){
      body += '<div style="border:1.5px solid #e0e0f0;border-radius:8px;padding:1rem;margin:1rem 0"><b>שאלה '+(i+1)+'</b><p>'+ex.question+'</p>'+(ex.hint?'<p style="color:#888;font-style:italic">💡 '+ex.hint+'</p>':'')+'<div style="border-top:1px dashed #ddd;margin-top:12px;padding-top:12px;height:80px;"></div></div>';
    });
  }
  w.document.write('<!DOCTYPE html><html lang="he" dir="rtl"><head><meta charset="UTF-8"><title>'+title+'</title><style>body{font-family:Arial,sans-serif;max-width:800px;margin:0 auto;padding:2rem;direction:rtl;}h2{color:#333;margin:1.5rem 0 0.5rem;}</style></head><body><h1>'+title+'</h1>'+body+'<script>window.onload=function(){window.print();}<\/script></body></html>');
  w.document.close();
}

function showLoad(msg) {
  document.getElementById('out').innerHTML = '<div class="card" style="text-align:center;padding:3rem;color:#55556a;"><div style="font-size:32px;margin-bottom:1rem;">'+msg.split(' ')[0]+'</div><div>'+msg+'</div></div>';
}
function st(msg,type){ var e=document.getElementById('status'); e.textContent=msg; e.className='status'+(type?' '+type:''); }
function resetBtn(){ var b=document.getElementById('recBtn'); b.className='btn show'; b.textContent='🎬 התחל שיעור'; }
</script>
</body>
</html>
